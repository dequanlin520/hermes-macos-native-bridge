name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact production version tag, for example v1.2.3'
        required: true
        type: string
      confirmation:
        description: 'Type RELEASE to confirm production signing, notarization, and publication.'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  production-release:
    name: Signed notarized production release
    runs-on: macos-15
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Validate trigger
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            [[ "${{ inputs.confirmation }}" == "RELEASE" ]] || { echo "missing production confirmation"; exit 64; }
            [[ "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "invalid production version"; exit 64; }
          else
            [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "invalid production tag"; exit 64; }
          fi
      - name: Clean checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require signing and notarization secrets
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: Scripts/release/sign-release.zsh --mode production --require-credentials
      - name: Build Developer ID signed release
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SOURCE_DATE_EPOCH: ${{ github.event.repository.pushed_at }}
        run: |
          version="${GITHUB_REF_NAME:-${{ inputs.version }}}"
          Scripts/release/build-release-candidate.zsh --version "$version" --signing-mode developer-id
      - name: Run M8-001 acceptance harness
        run: Scripts/integration/m8-001-release-candidate-acceptance.zsh
      - name: Submit notarization
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          root="$(find artifacts/m8-002/release-candidates -maxdepth 1 -type d -name 'HermesBridge-*' | sort | tail -n 1)"
          archive="$(find "$root" -maxdepth 1 -name '*.tar.gz' -print | sort | tail -n 1)"
          Scripts/release/notarize-release.zsh --archive "$archive" --staging-root "$root/staging" --mode production
      - name: Generate final release manifest
        run: |
          root="$(find artifacts/m8-002/release-candidates -maxdepth 1 -type d -name 'HermesBridge-*' | sort | tail -n 1)"
          version="${GITHUB_REF_NAME:-${{ inputs.version }}}"
          Scripts/release/generate-release-manifest.zsh --staging-root "$root/staging" --mode production --acceptance-result artifacts/m8-001/result.txt
          Scripts/release/package-release.zsh --staging-root "$root/staging" --version "$version" --mode developer-id
      - name: Verify production release gates
        run: |
          root="$(find artifacts/m8-002/release-candidates -maxdepth 1 -type d -name 'HermesBridge-*' | sort | tail -n 1)"
          archive="$(find "$root" -maxdepth 1 -name '*.tar.gz' -print | sort | tail -n 1)"
          Scripts/release/verify-release.zsh --staging-root "$root/staging" --archive "$archive" --mode production
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: artifacts/m8-002/release-candidates/*/*.tar.gz
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          root="$(find artifacts/m8-002/release-candidates -maxdepth 1 -type d -name 'HermesBridge-*' | sort | tail -n 1)"
          version="${GITHUB_REF_NAME:-${{ inputs.version }}}"
          gh release create "$version" "$root"/*.tar.gz "$root"/staging/ReleaseEvidence/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Hermes Bridge $version" \
            --notes "Production release built with M8-001 acceptance, Developer ID signing, notarization acceptance, staple verification, Gatekeeper assessment, checksums, manifest, SBOM, and provenance attestation."
